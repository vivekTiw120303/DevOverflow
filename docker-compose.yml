services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devoverflow_backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    networks:
      - devoverflow_net

  redis:
    image: redis:7
    container_name: devoverflow_redis
    ports:
      - "6379:6379"
    networks:
      - devoverflow_net

networks:
  devoverflow_net:
